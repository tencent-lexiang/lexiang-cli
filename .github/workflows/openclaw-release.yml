name: OpenClaw NPM Publish

on:
  push:
    tags:
      - 'openclaw-v*'

defaults:
  run:
    working-directory: openclaw

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: openclaw/pnpm-lock.yaml

      - name: Generate .npmrc for GitHub Packages
        run: |
          cat > .npmrc <<'EOF'
          @tencent-lexiang:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Set version from git tag
        run: |
          # tag 格式: openclaw-v0.0.1  →  去掉前缀得到 v0.0.1
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#openclaw-}"          # 去掉 "openclaw-" 前缀，保留 "v0.0.1"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
